<section class="copilot-section">
  <div class="container">
    <div class="chat-box">

      <h2>AI Compliance Copilot</h2>
      <p>Valutazione strutturata del rischio AI e controlli richiesti.</p>

      <textarea id="chat-input"
        placeholder="Descrivi il sistema AI..."></textarea>

      <div style="margin-top:15px;">
        <button id="analyze-btn">Analizza</button>
        <button id="clear-btn" onclick="document.getElementById('chat-input').value=''; document.getElementById('chat-output').innerHTML=''; document.getElementById('status-text').textContent='In attesa di input.';">Reset</button>
        <button id="pdf-btn">Export PDF</button>
      </div>

      <div id="status-text" style="margin-top:10px; color:#9aa6b2;">
        In attesa di input.
      </div>

      <hr style="margin:25px 0; opacity:0.1;">

      <div id="chat-output" class="output-placeholder"></div>

    </div>
  </div>
</section>

<script>
async function sendMessage() {
  const input = document.getElementById("chat-input");
  const output = document.getElementById("chat-output");
  const statusText = document.getElementById("status-text");

  const text = input.value.trim();

  if (!text) {
    output.className = "output-placeholder";
    output.innerHTML = "Inserisci una descrizione del sistema AI.";
    statusText.textContent = "Manca la descrizione del sistema.";
    return;
  }

  statusText.textContent = "Analisi in corso...";
  output.className = "output-placeholder";
  output.innerHTML = "Sto analizzando il sistema...";

  const payload = { system: text, context: "EU" };

  try {
    const response = await fetch("https://api.cognitivelogic.it/analyze", {
      method: "POST",
      headers: { "Content-Type": "application/json", "X-API-Key": "CL-qen-2026-xK9mPvZ3nRwQ7tYbDjF" },
      body: JSON.stringify(payload)
    });

    if (!response.ok) {
      const errorText = await response.text();
      throw new Error(errorText || "Errore API");
    }

    const data = await response.json();

    const riskLevel = data.risk_level || "UNKNOWN";
    const riskScore = data.risk_score ?? data.qen_score ?? "-";
    const summary = data.summary || "Nessuna sintesi disponibile.";
    const gaps = Array.isArray(data.gaps) ? data.gaps : [];
    const recommendations = Array.isArray(data.recommendations) ? data.recommendations : [];

    let decision = "";
    if (riskLevel === "HIGH") {
      decision = "🔴 BLOCK — intervento immediato richiesto";
    } else if (riskLevel === "MEDIUM") {
      decision = "🟠 ACTION REQUIRED — implementare controlli mancanti";
    } else if (riskLevel === "LOW") {
      decision = "🟢 MONITOR — sistema gestibile con controlli base";
    } else {
      decision = "⚪ REVIEW — classificazione da verificare";
    }

    output.className = "output-result";
    output.innerHTML = `
      <div class="result-top">
        <div class="result-risk">${riskLevel}</div>
        <div class="result-score">Risk score: ${riskScore}</div>
      </div>
      <div class="result-section">
        <h4>Sintesi</h4>
        <p>${summary}</p>
      </div>
      <div class="result-section">
        <h4>Decisione operativa</h4>
        <p>${decision}</p>
      </div>
      <div class="result-section">
        <h4>Gap rilevati</h4>
        ${gaps.length ? `<ul>${gaps.map(i => `<li>${i}</li>`).join("")}</ul>` : `<p>Nessun gap rilevato.</p>`}
      </div>
      <div class="result-section">
        <h4>Raccomandazioni</h4>
        ${recommendations.length ? `<ul>${recommendations.map(i => `<li>${i}</li>`).join("")}</ul>` : `<p>Nessuna raccomandazione disponibile.</p>`}
      </div>
    `;

    statusText.textContent = "Analisi completata.";
  } catch (error) {
    output.className = "output-placeholder";
    output.innerHTML = `Errore durante l'analisi: ${error.message}`;
    statusText.textContent = "Errore di connessione o risposta non valida.";
  }
}
</script>
