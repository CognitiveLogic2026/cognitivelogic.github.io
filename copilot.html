<section class="copilot-section">
  <div class="container">
    <div class="chat-box">

      <h2>AI Compliance Copilot</h2>
      <p>Valutazione strutturata del rischio AI e controlli richiesti.</p>

      <textarea id="chat-input"
        placeholder="Descrivi il sistema AI..."></textarea>

      <div style="margin-top:15px;">
        <button id="analyze-btn">Analizza</button>
        <button id="clear-btn">Reset</button>
        <button id="pdf-btn">Export PDF</button>
      </div>

      <div id="status-line" style="margin-top:10px; color:#9aa6b2;">
        In attesa di input.
      </div>

      <hr style="margin:25px 0; opacity:0.1;">

      <!-- OUTPUT -->

      <div>
        <h3>Decision</h3>
        <div id="decision-box">—</div>
      </div>

      <div>
        <h3>Risk Level</h3>
        <div id="risk-level">—</div>
      </div>

      <div>
        <h3>Risk Score</h3>
        <div id="risk-score">—</div>
      </div>

      <div>
        <h3>Why</h3>
        <div id="why">—</div>
      </div>

      <div>
        <h3>Impact</h3>
        <div id="impact">—</div>
      </div>

      <div>
        <h3>Summary</h3>
        <div id="summary">—</div>
      </div>

      <div>
        <h3>Gaps</h3>
        <ul id="gaps-list"></ul>
      </div>

      <div>
        <h3>Recommendations</h3>
        <ul id="recommendations-list"></ul>
      </div>

      <div>
        <h3>Raw Output</h3>
        <pre id="raw-output"></pre>
      </div>

    </div>
  </div>
</section>
