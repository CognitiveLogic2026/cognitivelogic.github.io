<!DOCTYPE html>

<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QEN Score — Cognitive Logic</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
html, body {
  all: unset !important;
  display: block !important;
  margin: 0 !important;
  padding: 0 !important;
  background: #080c0a !important;
  min-height: 100vh !important;
  font-family: 'JetBrains Mono', monospace !important;
  color: #c8e0cc !important;
}

body {
display: flex !important;
align-items: center !important;
justify-content: center !important;
padding: 20px !important;
}

body::before, body::after {
content: none !important;
display: none !important;
background: none !important;
}

#qen-root {
all: initial;
display: block;
font-family: ‘JetBrains Mono’, monospace;
color: #c8e0cc;
width: 100%;
max-width: 640px;
margin: 0 auto;
}

#qen-root *, #qen-root *::before, #qen-root *::after {
box-sizing: border-box;
margin: 0;
padding: 0;
font-family: ‘JetBrains Mono’, monospace;
line-height: normal;
}

#qen-root .t-wrap {
border: 1px solid #2a4a32;
border-radius: 4px;
overflow: hidden;
box-shadow: 0 0 0 1px #1a2e22, 0 0 40px rgba(0,255,106,0.07), 0 20px 60px rgba(0,0,0,0.85);
background: #080c0a;
}

#qen-root .t-bar {
background: #0a1510;
border-bottom: 1px solid #2a4a32;
padding: 10px 16px;
display: flex;
align-items: center;
gap: 12px;
}

#qen-root .t-dots { display: flex; gap: 6px; }
#qen-root .t-dot { width: 10px; height: 10px; border-radius: 50%; display: block; }
#qen-root .t-title { flex:1; text-align:center; font-size:10px; color:#5a7a60; letter-spacing:0.15em; text-transform:uppercase; }

#qen-root .t-body { background: #080c0a; padding: 28px; }

#qen-root .h-label { font-size:9px; color:#2a4a30; letter-spacing:0.3em; text-transform:uppercase; margin-bottom:6px; display:block; }
#qen-root .h-title { font-family:‘Syne’,sans-serif; font-size:13px; font-weight:700; color:#00ff6a; letter-spacing:0.08em; text-transform:uppercase; display:block; margin-bottom:24px; }

#qen-root .p-line { display:flex; align-items:flex-start; gap:8px; margin-bottom:10px; }
#qen-root .p-sym { color:#00ff6a; font-size:12px; padding-top:22px; flex-shrink:0; display:block; }
#qen-root .p-wrap { flex:1; }
#qen-root .f-label { font-size:9px; color:#5a7a60; letter-spacing:0.2em; text-transform:uppercase; margin-bottom:4px; display:block; }

#qen-root input[type=“text”] {
all: unset;
display: block;
width: 100%;
box-sizing: border-box;
background: #0d1210;
border: 1px solid #2a4a32;
border-radius: 2px;
color: #c8e0cc;
font-family: ‘JetBrains Mono’, monospace;
font-size: 12px;
padding: 8px 10px;
-webkit-appearance: none;
}

#qen-root input[type=“text”]:focus {
border-color: #00ff6a;
box-shadow: 0 0 0 1px rgba(0,255,106,0.15);
}

#qen-root textarea {
all: unset;
display: block;
width: 100%;
box-sizing: border-box;
background: #0d1210;
border: 1px solid #2a4a32;
border-radius: 2px;
color: #c8e0cc;
font-family: ‘JetBrains Mono’, monospace;
font-size: 12px;
padding: 8px 10px;
min-height: 72px !important;
max-height: 120px !important;
line-height: 1.5;
resize: vertical;
-webkit-appearance: none;
}

#qen-root textarea:focus {
border-color: #00ff6a;
box-shadow: 0 0 0 1px rgba(0,255,106,0.15);
}

#qen-root input::placeholder, #qen-root textarea::placeholder { color: #2a4a30; }

#qen-root .run-btn {
all: unset;
display: block;
width: 100%;
box-sizing: border-box;
background: transparent;
border: 1px solid #00ff6a;
color: #00ff6a;
font-family: ‘JetBrains Mono’, monospace;
font-size: 11px;
font-weight: 600;
letter-spacing: 0.2em;
text-transform: uppercase;
padding: 10px;
cursor: pointer;
text-align: center;
border-radius: 2px;
margin-top: 8px;
-webkit-appearance: none;
}

#qen-root .run-btn:hover { background: rgba(0,255,106,0.07); }
#qen-root .run-btn:disabled { opacity: 0.4; cursor: not-allowed; }

#qen-root .loading { display:none; padding:20px 0; text-align:center; }
#qen-root .loading.on { display:block; }
#qen-root .loading-text { font-size:11px; color:#00cc54; letter-spacing:0.15em; }
#qen-root .blink { display:inline-block; width:8px; height:12px; background:#00ff6a; margin-left:4px; vertical-align:middle; animation:blink 0.8s step-end infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

#qen-root .err { display:none; padding:10px 12px; background:rgba(255,58,58,0.05); border:1px solid rgba(255,58,58,0.28); border-radius:2px; font-size:11px; color:#ff3a3a; margin-top:10px; }
#qen-root .err.on { display:block; }

#qen-root .result { display:none; }
#qen-root .result.on { display:block; }

#qen-root .r-div { display:block; border:none; border-top:1px solid #1a2e22; margin:20px 0; }
#qen-root .r-head { font-size:9px; color:#2a4a30; letter-spacing:0.25em; text-transform:uppercase; margin-bottom:16px; display:block; }

#qen-root .score-main { display:flex; align-items:center; gap:20px; margin-bottom:20px; }
#qen-root .score-num { font-family:‘Syne’,sans-serif; font-size:56px; font-weight:800; line-height:1; color:#00ff6a; text-shadow:0 0 30px rgba(0,255,106,0.35); min-width:120px; display:block; }
#qen-root .score-right { flex:1; }

#qen-root .badge { display:inline-block; font-size:10px; font-weight:700; letter-spacing:0.2em; text-transform:uppercase; padding:4px 10px; border-radius:2px; margin-bottom:8px; }
#qen-root .badge-gold  { background:rgba(255,215,0,0.1); border:1px solid #ffd700; color:#ffd700; }
#qen-root .badge-silver{ background:rgba(192,192,192,0.1); border:1px solid #c0c0c0; color:#c0c0c0; }
#qen-root .badge-bronze{ background:rgba(205,127,50,0.1); border:1px solid #cd7f32; color:#cd7f32; }
#qen-root .badge-std   { background:rgba(0,255,106,0.07); border:1px solid #004a20; color:#00cc54; }

#qen-root .entity-name { font-size:13px; color:#c8e0cc; font-weight:600; display:block; }

#qen-root .axes { margin-bottom:16px; }
#qen-root .axis-row { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
#qen-root .axis-lbl { font-size:10px; color:#5a7a60; width:120px; flex-shrink:0; display:block; }
#qen-root .axis-track { flex:1; height:3px; background:#1a2e22; border-radius:2px; overflow:hidden; }
#qen-root .axis-fill { height:100%; background:#00ff6a; border-radius:2px; width:0%; transition:width 1s cubic-bezier(0.4,0,0.2,1); }
#qen-root .axis-val { font-size:11px; color:#00ff6a; width:36px; text-align:right; flex-shrink:0; display:block; }

#qen-root .sintesi { background:#0d1210; border:1px solid #1a2e22; border-left:2px solid #004a20; padding:12px 14px; border-radius:2px; }
#qen-root .s-label { font-size:9px; color:#2a4a30; letter-spacing:0.2em; text-transform:uppercase; margin-bottom:6px; display:block; }
#qen-root .s-text { font-size:11px; color:#5a7a60; line-height:1.6; display:block; }

#qen-root .t-footer { margin-top:20px; padding-top:14px; border-top:1px solid #1a2e22; display:flex; justify-content:space-between; align-items:center; }
#qen-root .f-left { font-size:9px; color:#2a4a30; letter-spacing:0.15em; display:block; }
#qen-root .f-link { font-size:9px; color:#2a4a30; letter-spacing:0.1em; text-decoration:none; display:block; }
#qen-root .f-link:hover { color:#00ff6a; }
</style>

</head>

<script>
const API = 'https://api.cognitivelogic.it/gemini/qen-score';

async function runScore() {
  const nome = document.getElementById('nome').value.trim();
  const desc = document.getElementById('desc').value.trim();
  const btn = document.getElementById('runBtn');
  const loading = document.getElementById('loading');
  const result = document.getElementById('result');
  const err = document.getElementById('errMsg');

  if (!desc) { showErr('Campo descrizione obbligatorio.'); return; }

  result.classList.remove('on');
  err.classList.remove('on');
  loading.classList.add('on');
  btn.disabled = true;
  ['bVs','bVt','bVa'].forEach(id => document.getElementById(id).style.width = '0%');

  try {
    const res = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ nome, description: desc })
    });
    const data = await res.json();
    if (!res.ok || data.error) throw new Error(data.error || 'Errore API');
    render(nome, data.qen);
  } catch(e) {
    showErr('Errore: ' + e.message);
  } finally {
    loading.classList.remove('on');
    btn.disabled = false;
  }
}

function render(nome, q) {
  document.getElementById('scoreNum').textContent = q.qen_score.toFixed(1);
  document.getElementById('entityName').textContent = nome || '—';
  document.getElementById('sintesi').textContent = q.sintesi;
  const b = document.getElementById('badge');
  b.textContent = q.badge;
  b.className = 'badge';
  const bl = q.badge.toLowerCase();
  if (bl.includes('gold')) b.classList.add('badge-gold');
  else if (bl.includes('silver')) b.classList.add('badge-silver');
  else if (bl.includes('bronze')) b.classList.add('badge-bronze');
  else b.classList.add('badge-std');
  document.getElementById('vVs').textContent = q.vs.toFixed(1);
  document.getElementById('vVt').textContent = q.vt.toFixed(1);
  document.getElementById('vVa').textContent = q.va.toFixed(1);
  document.getElementById('result').classList.add('on');
  setTimeout(() => {
    document.getElementById('bVs').style.width = q.vs + '%';
    document.getElementById('bVt').style.width = q.vt + '%';
    document.getElementById('bVa').style.width = q.va + '%';
  }, 50);
}

function showErr(msg) {
  const el = document.getElementById('errMsg');
  el.textContent = msg;
  el.classList.add('on');
}

document.getElementById('nome').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('desc').focus();
});
</script>
